name: Publish to npm

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write   # npm provenance

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Read local version
        id: local
        run: echo "version=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Check if version already on npm
        id: gate
        run: |
          set +e
          NAME=$(node -p "require('./package.json').name")
          PUBLISHED=$(npm view "$NAME"@${{ steps.local.outputs.version }} version 2>/dev/null)
          if [ "$PUBLISHED" = "${{ steps.local.outputs.version }}" ]; then
            echo "already=true"  >> "$GITHUB_OUTPUT"
            echo "Version ${{ steps.local.outputs.version }} is already on npm; skipping."
          else
            echo "already=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish
        if: steps.gate.outputs.already == 'false'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_ACCESS_TOKEN }}
        run: npm publish --access public --provenance
